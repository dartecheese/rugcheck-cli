<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>rugcheck — local dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ink: { 950: '#07090f', 900: '#0b0f1a', 800: '#111726', 700: '#1a2236', 600: '#2a324a' },
            grade: {
              A: '#22c55e', B: '#84cc16', C: '#eab308', D: '#f97316', F: '#ef4444',
            },
          },
          fontFamily: { mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://api.dexscreener.com" />
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .grade-ring { background: conic-gradient(var(--c) calc(var(--p) * 1%), rgba(255,255,255,0.06) 0); }
    .pill { @apply px-2 py-0.5 rounded-md text-xs font-semibold uppercase tracking-wider; }
    .skeleton { @apply animate-pulse bg-ink-700 rounded; }
  </style>
</head>
<body class="bg-ink-950 text-slate-100 min-h-screen">
  <header class="border-b border-ink-700">
    <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-400 to-cyan-500 grid place-items-center font-bold text-ink-950">R</div>
        <div>
          <h1 class="text-lg font-semibold tracking-tight">rugcheck</h1>
          <p class="text-xs text-slate-400 -mt-0.5">composite token risk · local dashboard</p>
        </div>
      </div>
      <a class="text-xs text-slate-400 hover:text-slate-200" href="https://github.com/dartecheese/rugcheck-cli" target="_blank" rel="noopener">GitHub →</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-10 space-y-8">
    <form id="scanForm" class="bg-ink-900 border border-ink-700 rounded-2xl p-5 shadow-lg">
      <label class="block text-xs uppercase tracking-wider text-slate-400 mb-2">Token address</label>
      <div class="flex flex-col md:flex-row gap-3">
        <input
          id="addressInput"
          name="address"
          type="text"
          placeholder="0x… or Solana mint"
          autocomplete="off"
          spellcheck="false"
          class="flex-1 bg-ink-950 border border-ink-600 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20 outline-none rounded-lg px-4 py-3 font-mono text-sm"
          required
        />
        <select id="chainSelect" name="chain"
          class="bg-ink-950 border border-ink-600 focus:border-emerald-400 outline-none rounded-lg px-3 py-3 text-sm">
          <option value="">auto-detect</option>
          <option value="ethereum">Ethereum</option>
          <option value="bsc">BSC</option>
          <option value="polygon">Polygon</option>
          <option value="arbitrum">Arbitrum</option>
          <option value="base">Base</option>
          <option value="optimism">Optimism</option>
          <option value="avalanche">Avalanche</option>
          <option value="solana">Solana</option>
        </select>
        <button type="submit"
          id="scanBtn"
          class="bg-emerald-500 hover:bg-emerald-400 disabled:bg-ink-600 disabled:text-slate-400 text-ink-950 font-semibold rounded-lg px-6 py-3 transition">
          Scan
        </button>
      </div>
      <div class="mt-3 text-xs text-slate-500 flex flex-wrap gap-x-4 gap-y-1">
        <span>Try:</span>
        <button type="button" data-fill="0x6982508145454ce325ddbe47a25d4ec3d2311933" class="hover:text-emerald-400 underline-offset-2 hover:underline font-mono">PEPE (eth)</button>
        <button type="button" data-fill="0x4200000000000000000000000000000000000006" data-chain="base" class="hover:text-emerald-400 underline-offset-2 hover:underline font-mono">WETH (base)</button>
        <button type="button" data-fill="So11111111111111111111111111111111111111112" class="hover:text-emerald-400 underline-offset-2 hover:underline font-mono">wSOL</button>
      </div>
    </form>

    <section id="resultArea" class="hidden space-y-6"></section>

    <section id="emptyState" class="text-center py-16 text-slate-500 text-sm">
      Paste a token address above to scan against rugcheck.xyz, GoPlus, and DexScreener.
    </section>
  </main>

  <script>
    const SEVERITY_CLASS = {
      info:     'bg-slate-700 text-slate-200',
      low:      'bg-yellow-900/60 text-yellow-300',
      medium:   'bg-orange-900/60 text-orange-300',
      high:     'bg-red-900/60 text-red-300',
      critical: 'bg-red-500 text-white',
    };
    const SEVERITY_ORDER = { critical: 0, high: 1, medium: 2, low: 3, info: 4 };

    const fmtUsd = (v) => {
      if (v == null) return '—';
      if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
      if (v >= 1e3) return '$' + (v/1e3).toFixed(2) + 'K';
      if (v < 1) return '$' + Number(v).toFixed(4);
      return '$' + Number(v).toFixed(2);
    };
    const fmtPct = (v) => v == null ? '—' : Number(v).toFixed(1) + '%';
    const fmtNum = (v) => v == null ? '—' : Number(v).toLocaleString();
    const trunc = (s, n=10) => s && s.length > n*2 ? s.slice(0,n) + '…' + s.slice(-4) : s;

    const form = document.getElementById('scanForm');
    const addrInput = document.getElementById('addressInput');
    const chainSel = document.getElementById('chainSelect');
    const btn = document.getElementById('scanBtn');
    const resultArea = document.getElementById('resultArea');
    const emptyState = document.getElementById('emptyState');

    document.querySelectorAll('button[data-fill]').forEach((b) => {
      b.addEventListener('click', () => {
        addrInput.value = b.dataset.fill;
        chainSel.value = b.dataset.chain || '';
        form.requestSubmit();
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const address = addrInput.value.trim();
      if (!address) return;
      const chain = chainSel.value;
      btn.disabled = true; btn.textContent = 'Scanning…';
      emptyState.classList.add('hidden');
      resultArea.classList.remove('hidden');
      resultArea.innerHTML = skeleton();

      try {
        const params = new URLSearchParams({ address });
        if (chain) params.set('chain', chain);
        const r = await fetch('/api/scan?' + params.toString());
        if (!r.ok) {
          const err = await r.json().catch(() => ({ detail: r.statusText }));
          resultArea.innerHTML = errorCard(err.detail || 'unknown error');
          return;
        }
        const report = await r.json();
        resultArea.innerHTML = render(report);
      } catch (err) {
        resultArea.innerHTML = errorCard(err.message || String(err));
      } finally {
        btn.disabled = false; btn.textContent = 'Scan';
      }
    });

    function skeleton() {
      return `
        <div class="bg-ink-900 border border-ink-700 rounded-2xl p-6">
          <div class="flex gap-6 items-center">
            <div class="skeleton w-32 h-32 rounded-full"></div>
            <div class="flex-1 space-y-3">
              <div class="skeleton h-6 w-1/3"></div>
              <div class="skeleton h-4 w-2/3"></div>
              <div class="skeleton h-4 w-1/2"></div>
            </div>
          </div>
        </div>`;
    }

    function errorCard(msg) {
      return `
        <div class="bg-red-950/40 border border-red-700 text-red-200 rounded-2xl p-6">
          <div class="font-semibold mb-1">Scan failed</div>
          <div class="text-sm">${escape(msg)}</div>
        </div>`;
    }

    function render(r) {
      const grade = r.grade || 'F';
      const score = r.score ?? 0;
      const color = `var(--grade-${grade})`;
      const ring = `
        <div class="relative w-32 h-32 rounded-full grade-ring shrink-0"
             style="--c: ${gradeColor(grade)}; --p: ${score}">
          <div class="absolute inset-2 rounded-full bg-ink-900 grid place-items-center">
            <div class="text-center">
              <div class="text-3xl font-bold leading-none" style="color:${gradeColor(grade)}">${score}</div>
              <div class="text-xs text-slate-400 mt-1 tracking-widest">/ 100</div>
            </div>
          </div>
          <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 px-3 py-0.5 rounded-full text-sm font-bold"
               style="background:${gradeColor(grade)};color:#07090f">${grade}</div>
        </div>`;

      const sources = Object.entries(r.sources || {})
        .map(([k, v]) => `<span class="pill ${v ? 'bg-emerald-900/60 text-emerald-300' : 'bg-ink-700 text-slate-500'}">${k}${v ? '' : ' ✗'}</span>`)
        .join(' ');

      const findings = (r.findings || [])
        .slice()
        .sort((a, b) => SEVERITY_ORDER[a.severity] - SEVERITY_ORDER[b.severity])
        .map((f) => `
          <li class="flex items-start gap-3 py-3 border-b border-ink-700 last:border-0">
            <span class="pill ${SEVERITY_CLASS[f.severity] || ''} shrink-0 mt-0.5">${f.severity}</span>
            <div class="flex-1">
              <div class="font-mono text-xs text-slate-400">${escape(f.code)}</div>
              <div class="text-sm">${escape(f.detail)}</div>
            </div>
          </li>`).join('');

      const findingsBlock = findings
        ? `<ul class="divide-y divide-ink-700">${findings}</ul>`
        : `<div class="text-sm text-emerald-400">No risk findings detected.</div>`;

      return `
        <div class="bg-ink-900 border border-ink-700 rounded-2xl p-6 shadow-lg">
          <div class="flex flex-col md:flex-row gap-6 items-start md:items-center">
            ${ring}
            <div class="flex-1 min-w-0">
              <div class="flex items-baseline flex-wrap gap-2">
                <h2 class="text-2xl font-bold">${escape(r.symbol || '?')}</h2>
                <span class="text-slate-400">${escape(r.name || '')}</span>
                <span class="pill bg-cyan-900/60 text-cyan-300">${escape(r.chain)}</span>
              </div>
              <div class="font-mono text-xs text-slate-400 mt-1 break-all">${escape(r.address)}</div>
              <div class="mt-3 flex flex-wrap gap-2">${sources}</div>
              ${r.pair_url ? `<a href="${escape(r.pair_url)}" target="_blank" rel="noopener" class="inline-block mt-3 text-sm text-emerald-400 hover:text-emerald-300">Open on DexScreener →</a>` : ''}
            </div>
          </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          ${stat('Price', fmtUsd(r.price_usd))}
          ${stat('Liquidity', fmtUsd(r.liquidity_usd))}
          ${stat('FDV', fmtUsd(r.fdv_usd))}
          ${stat('Holders', fmtNum(r.holder_count))}
          ${stat('LP locked', fmtPct(r.lp_locked_pct))}
          ${stat('Top-10 holders', fmtPct(r.top10_holder_pct))}
          ${stat('Honeypot', boolBadge(r.is_honeypot, true))}
          ${stat('Verified source', boolBadge(r.is_open_source, false))}
        </div>

        <div class="bg-ink-900 border border-ink-700 rounded-2xl p-6">
          <h3 class="text-sm uppercase tracking-wider text-slate-400 mb-3">Findings</h3>
          ${findingsBlock}
        </div>

        <details class="bg-ink-900 border border-ink-700 rounded-2xl p-4">
          <summary class="cursor-pointer text-sm text-slate-400 hover:text-slate-200">Raw JSON</summary>
          <pre class="mt-3 text-xs font-mono text-slate-300 overflow-auto">${escape(JSON.stringify(r, null, 2))}</pre>
        </details>`;
    }

    function stat(label, value) {
      return `
        <div class="bg-ink-900 border border-ink-700 rounded-xl px-4 py-3">
          <div class="text-[10px] uppercase tracking-wider text-slate-400">${label}</div>
          <div class="font-semibold mt-0.5">${value}</div>
        </div>`;
    }

    function boolBadge(value, badIfTrue) {
      if (value == null) return '<span class="text-slate-500">—</span>';
      const isBad = badIfTrue ? value : !value;
      const cls = isBad ? 'text-red-400' : 'text-emerald-400';
      return `<span class="${cls}">${value ? 'yes' : 'no'}</span>`;
    }

    function gradeColor(g) {
      return ({A:'#22c55e',B:'#84cc16',C:'#eab308',D:'#f97316',F:'#ef4444'}[g] || '#94a3b8');
    }
    function escape(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
      ));
    }
  </script>
</body>
</html>
